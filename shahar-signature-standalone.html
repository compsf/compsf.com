    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    // DOMParser/replaceWith are inert per spec — re-create each with

    const doc = new DOMParser().parseFromString(template, 'text/html');

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

      window.Babel.transformScriptTags();
    }

    console.error('Bundle unpack error:', err);

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>Email Signature — Shahar Geva<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n@font-face{\n  font-family:'Adegoke';\n  src:url(\"ebefca3d-9153-4bb1-9aec-feda3e542cc2\") format('truetype');\n  font-display:swap;\n}\n  :root{\n    --ink:#1a1a1a;\n    --ink-2:#2b2b2b;\n    --muted:#6b6b6b;\n    --line:#e6e3de;\n    --page:#f5f2ec;\n    --amber:#e39a3b;\n    --rust:#b83a24;\n  }\n  html,body{margin:0;padding:0;background:var(--page);color:var(--ink);font-family:\"Helvetica Neue\",Arial,sans-serif;-webkit-font-smoothing:antialiased;}\n  .wrap{max-width:880px;margin:0 auto;padding:48px 24px 96px;}\n  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin:0 0 8px;}\n  h1{font-size:34px;line-height:1.15;margin:0 0 6px;font-weight:700;letter-spacing:-.01em;}\n  h1 .accent{background:linear-gradient(90deg,var(--amber),var(--rust));-webkit-background-clip:text;background-clip:text;color:transparent;}\n  .lede{color:var(--muted);font-size:15px;line-height:1.55;margin:0 0 32px;max-width:62ch;}\n  .section-label{display:flex;align-items:center;gap:12px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin:40px 0 14px;}\n  .section-label .num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:999px;background:var(--ink);color:#fff;font-size:10px;letter-spacing:0;font-weight:600;}\n  .section-label .rule{flex:1;height:1px;background:var(--line);}\n  .card{background:#fff;border:1px solid var(--line);border-radius:6px;box-shadow:0 1px 0 rgba(0,0,0,.02),0 20px 40px -30px rgba(20,20,20,.25);}\n  .card .bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fafaf7,#f4f1eb);border-radius:6px 6px 0 0;}\n  .card .bar .dots{display:flex;gap:6px;}\n  .card .bar .dots i{width:10px;height:10px;border-radius:999px;background:#d8d4cc;display:inline-block;}\n  .card .bar .tab{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}\n  .card .body{padding:36px 40px;}\n  .copy-block{position:relative;background:#fff;border:1px dashed #cfc8bc;border-radius:4px;padding:24px;}\n  .copy-tag{position:absolute;top:-10px;left:16px;background:var(--ink);color:#fff;font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:3px 8px;border-radius:3px;}\n  .actions{display:flex;gap:10px;margin:18px 0 0;flex-wrap:wrap;}\n  .btn{appearance:none;border:1px solid var(--ink);background:var(--ink);color:#fff;font:inherit;font-size:13px;padding:10px 16px;border-radius:4px;cursor:pointer;letter-spacing:.02em;transition:transform .08s ease, background .15s ease;}\n  .btn:hover{background:#000;}\n  .btn:active{transform:translateY(1px);}\n  .btn.ghost{background:transparent;color:var(--ink);}\n  .btn.ghost:hover{background:var(--ink);color:#fff;}\n  .note{font-size:12px;color:var(--muted);margin-top:10px;}\n  .steps{margin:0;padding:0;list-style:none;counter-reset:s;}\n  .steps li{counter-increment:s;position:relative;padding:14px 0 14px 44px;border-bottom:1px solid var(--line);font-size:14px;line-height:1.55;color:var(--ink-2);}\n  .steps li:last-child{border-bottom:0;}\n  .steps li::before{content:counter(s,decimal-leading-zero);position:absolute;left:0;top:14px;font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:.12em;border:1px solid var(--line);border-radius:999px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;background:#fff;}\n  kbd{font:inherit;font-size:12px;background:#f1ede6;border:1px solid var(--line);border-bottom-width:2px;border-radius:3px;padding:1px 6px;color:var(--ink);}\n  .swap-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}\n  .swap-table th,.swap-table td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top;}\n  .swap-table th{font-weight:500;color:var(--muted);font-size:11px;letter-spacing:.12em;text-transform:uppercase;width:32%;}\n  .swap-table td code{font:12px/1.5 \"SF Mono\",Menlo,Consolas,monospace;background:#f4f1eb;padding:2px 6px;border-radius:3px;color:var(--ink-2);}\n  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink);color:#fff;font-size:13px;padding:10px 16px;border-radius:999px;box-shadow:0 10px 30px rgba(0,0,0,.2);transition:transform .25s cubic-bezier(.2,.8,.2,1);pointer-events:none;}\n  .toast.show{transform:translateX(-50%) translateY(0);}\n  .footer{margin-top:48px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;}\n  .footer a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line);}\n  .footer a:hover{border-color:var(--ink);}\n\n  /* -- SIGNATURE (email-client safe; keep styles inline in copy block) -- */\n  .sig-preview{background:#fff;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"wrap\">\n\n  <p class=\"eyebrow\">CompSF · Email Signature<\u002Fp>\n  <h1>Signature for <span class=\"accent\">Shahar Geva<\u002Fspan><\u002Fh1>\n  <p class=\"lede\">Same CompSF template used across the team — photo, logo, and brand colors matched. Outlook-safe: table-based, inline styles, web-safe fonts, hosted image URLs.<\u002Fp>\n\n  <!-- ======================= PREVIEW ======================= -->\n  <div class=\"section-label\"><span class=\"num\">1<\u002Fspan>Preview <span class=\"rule\"><\u002Fspan><\u002Fdiv>\n  <div class=\"card\">\n    <div class=\"bar\">\n      <div class=\"dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n      <div class=\"tab\">New Message · Outlook<\u002Fdiv>\n      <div style=\"width:30px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"body sig-preview\">\n      <div style=\"color:#2b2b2b;font:14px/1.6 'Helvetica Neue',Arial,sans-serif;\">\n        Hi team,<br><br>\n        Quick update on the Q2 cybersecurity roadmap — details below. Happy to jump on a call if helpful.<br><br>\n        Best,<br>Shahar\n      <\u002Fdiv>\n      <div style=\"height:20px;\"><\u002Fdiv>\n\n      <!-- Signature block starts -->\n      <div id=\"signature-live\">\n        <!-- Filled by injection below so preview matches copy block exactly -->\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======================= COPY BLOCK ======================= -->\n  <div class=\"section-label\"><span class=\"num\">2<\u002Fspan>Copy-paste HTML <span class=\"rule\"><\u002Fspan><\u002Fdiv>\n  <div class=\"card\">\n    <div class=\"body\">\n      <div class=\"copy-block\">\n        <span class=\"copy-tag\">COPY · START<\u002Fspan>\n<textarea id=\"sig-html\" readonly=\"\" spellcheck=\"false\" style=\"width:100%;min-height:260px;border:0;resize:vertical;font:12px/1.55 'SF Mono',Menlo,Consolas,monospace;color:#2b2b2b;background:transparent;outline:none;\"><\u002Ftextarea>\n        <span class=\"copy-tag\" style=\"top:auto;bottom:-10px;left:auto;right:16px;background:var(--rust);\">COPY · END<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"actions\">\n        <button class=\"btn\" id=\"copy-btn\">Copy HTML<\u002Fbutton>\n        <button class=\"btn ghost\" id=\"download-btn\">Download .htm file<\u002Fbutton>\n      <\u002Fdiv>\n      <p class=\"note\">Tip: in Outlook's signature editor, click the <kbd>&lt;/&gt;<\u002Fkbd> source-view button (Mac) or use <kbd>Ctrl<\u002Fkbd> + <kbd>Shift<\u002Fkbd> + <kbd>V<\u002Fkbd> (Windows) to paste as HTML.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======================= INSTALL ======================= -->\n  <div class=\"section-label\"><span class=\"num\">3<\u002Fspan>Install in Outlook <span class=\"rule\"><\u002Fspan><\u002Fdiv>\n  <div class=\"card\">\n    <div class=\"body\">\n      <ol class=\"steps\">\n        <li>Open Outlook → <strong>Settings<\u002Fstrong> → <strong>Signatures<\u002Fstrong> (Mac) or <strong>File → Options → Mail → Signatures<\u002Fstrong> (Windows).<\u002Fli>\n        <li>Click <strong>New<\u002Fstrong>, name it <em>\"CompSF — Shahar\"<\u002Fem>.<\u002Fli>\n        <li>Mac: click the <kbd>&lt;/&gt;<\u002Fkbd> source button. Windows: type a space, then paste with <kbd>Ctrl<\u002Fkbd>+<kbd>Shift<\u002Fkbd>+<kbd>V<\u002Fkbd>.<\u002Fli>\n        <li>Paste everything between the <em>COPY · START<\u002Fem> and <em>COPY · END<\u002Fem> markers above.<\u002Fli>\n        <li><strong>Save.<\u002Fstrong> Set it as the default for <em>New messages<\u002Fem> and <em>Replies/forwards<\u002Fem>.<\u002Fli>\n        <li>Send a test email to yourself — confirm the logo loads and links work.<\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======================= FIELDS ======================= -->\n  <div class=\"section-label\"><span class=\"num\">4<\u002Fspan>What changed from Shahar's version <span class=\"rule\"><\u002Fspan><\u002Fdiv>\n  <div class=\"card\">\n    <div class=\"body\" style=\"padding-top:24px;padding-bottom:28px;\">\n      <table class=\"swap-table\">\n        <tbody><tr><th>Name<\u002Fth><td><code>Shahar Geva<\u002Fcode><\u002Ftd><\u002Ftr>\n        <tr><th>Title<\u002Fth><td><code>Founder &amp; CEO<\u002Fcode> · <code>IT &amp; Cybersecurity Trusted Advisor<\u002Fcode><\u002Ftd><\u002Ftr>\n        <tr><th>Email<\u002Fth><td><code>shahar@compsf.com<\u002Fcode><\u002Ftd><\u002Ftr>\n        <tr><th>Phone<\u002Fth><td><code>(415) 864-6168<\u002Fcode> office · <code>(415) 706-4442<\u002Fcode> mobile<\u002Ftd><\u002Ftr>\n        <tr><th>LinkedIn<\u002Fth><td><code>Personal profile<\u002Fcode><\u002Ftd><\u002Ftr>\n        <tr><th>Website / Address<\u002Fth><td>compsf.com · 548 Market Street, San Francisco, CA 94104<\u002Ftd><\u002Ftr>\n        <tr><th>Logo, layout, colors, type<\u002Fth><td>Same CompSF template<\u002Ftd><\u002Ftr>\n      <\u002Ftbody><\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>
